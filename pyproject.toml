# pyproject.toml — project-level configuration.
# Modern Python convention (PEP 518/621) for tool settings.

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]
ignore = ["RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
"test_*.py" = ["E501"]